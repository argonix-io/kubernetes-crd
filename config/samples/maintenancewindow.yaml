apiVersion: argonix.io/v1alpha1
kind: MaintenanceWindow
metadata:
  name: example-weekly-deploy
spec:
  name: "Weekly Deploy Window"
  groupId: "group-uuid"
  repeat: weekly
  timeFrom: "02:00"
  timeTo: "04:00"
  weekdays: "1,3,5"
---
apiVersion: argonix.io/v1alpha1
kind: MaintenanceWindow
metadata:
  name: example-one-time
spec:
  name: "Database Migration"
  groupId: "group-uuid"
  repeat: once
  startsAt: "2025-01-15T02:00:00Z"
  endsAt: "2025-01-15T06:00:00Z"
---
apiVersion: argonix.io/v1alpha1
kind: MaintenanceWindow
metadata:
  name: example-cron
spec:
  name: "Nightly Backup"
  groupId: "group-uuid"
  repeat: cron
  cronExpression: "0 3 * * *"
