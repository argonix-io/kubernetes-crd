{{- if not .Values.argonix.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argonix-crd.fullname" . }}-credentials
  labels:
    {{- include "argonix-crd.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ required "argonix.apiKey is required (or set argonix.existingSecret)" .Values.argonix.apiKey | quote }}
  {{- if .Values.argonix.apiUrl }}
  url: {{ .Values.argonix.apiUrl | quote }}
  {{- end }}
{{- end }}
