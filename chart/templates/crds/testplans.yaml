apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: testplans.argonix.io
  labels:
    {{- include "argonix-crd.labels" . | nindent 4 }}
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
spec:
  group: argonix.io
  names:
    kind: TestPlan
    listKind: TestPlanList
    plural: testplans
    singular: testplan
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: End Date
          type: string
          jsonPath: .spec.endDate
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: TestPlan is the Schema for the testplans API.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                suites:
                  type: array
                  items:
                    type: string
                tags:
                  type: array
                  items:
                    type: string
                endDate:
                  type: string
                  description: Target completion date (YYYY-MM-DD).
            status:
              type: object
              properties:
                id:
                  type: string
                dateCreated:
                  type: string
                dateModified:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
