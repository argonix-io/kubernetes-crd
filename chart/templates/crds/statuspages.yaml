apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: statuspages.argonix.io
  labels:
    {{- include "argonix-crd.labels" . | nindent 4 }}
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
spec:
  group: argonix.io
  names:
    kind: StatusPage
    listKind: StatusPageList
    plural: statuspages
    singular: statuspage
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Slug
          type: string
          jsonPath: .spec.slug
        - name: Visibility
          type: string
          jsonPath: .spec.visibility
        - name: Active
          type: boolean
          jsonPath: .spec.isActive
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: StatusPage is the Schema for the statuspages API.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
                customDomain:
                  type: string
                visibility:
                  type: string
                  default: "public"
                  enum: [public, private]
                logoUrl:
                  type: string
                accentColor:
                  type: string
                  default: "#3B82F6"
                customCss:
                  type: string
                showHealthGraph:
                  type: boolean
                  default: true
                isActive:
                  type: boolean
                  default: true
            status:
              type: object
              properties:
                id:
                  type: string
                publicUrl:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
