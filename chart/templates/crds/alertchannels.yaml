apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertchannels.argonix.io
  labels:
    {{- include "argonix-crd.labels" . | nindent 4 }}
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
spec:
  group: argonix.io
  names:
    kind: AlertChannel
    listKind: AlertChannelList
    plural: alertchannels
    singular: alertchannel
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.channelType
        - name: Active
          type: boolean
          jsonPath: .spec.isActive
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: AlertChannel is the Schema for the alertchannels API.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
                - channelType
                - config
              properties:
                name:
                  type: string
                channelType:
                  type: string
                  enum: [email, slack, webhook, pagerduty, opsgenie, telegram, discord, microsoft_teams]
                config:
                  type: string
                  description: JSON-encoded configuration object specific to the channel type.
                isActive:
                  type: boolean
                  default: true
            status:
              type: object
              properties:
                id:
                  type: string
                dateCreated:
                  type: string
                dateModified:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
